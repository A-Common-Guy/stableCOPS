name: euservo_rp
description: Yiyou EuServo RP servo module (RP EDS V1.4), CSP-minimal PDO layout

vendor_eds: eds/EDS files/EuServo_RP_EDS_（RP）V1.4.eds

master:
  node_id: 127
  baudrate: 1000
  heartbeat_consumer: false
  heartbeat_producer: 0
  sync_period: 1000
  sync_window: 0
  start: true
  start_nodes: true
  reset_all_nodes: false
  stop_all_nodes: false
  boot_time: 5000

node:
  name: rp_joint
  node_id: 1
  mandatory: true
  boot: true
  reset_communication: true

generation:
  generated_dir: generated/canopen/euservo_rp
  dcf_dir: dcf
  no_strict: true

identity_policy: ignore
pdo_policy: csp-minimal
mode_policy: vendor-default

# The RP EDS ships the same vendor-default RxPDO1 (controlword + target velocity
# + modes) as the EYou PHU module. The proven CSP recipe (manual Table 5-5 /
# 3.6.1) uses RxPDO1 = controlword + target position and keeps the mode object
# out of the cyclic stream, so we apply the same overrides here. RPDO2/RPDO3 are
# disabled because CSP only needs the target position, which now rides in RPDO1.
# TPDO feedback is left at the vendor default so statusword/mode/position/
# velocity/torque stay available. This matches kPdoSetup in MotorDriver.cpp.
eds_overrides:
  # RxPDO1 mapping -> controlword (0x6040:00,16) + target position (0x607A:00,32)
  "1600sub0": { DefaultValue: "2" }
  "1600sub2": { DefaultValue: "0x607A0020" }
  # Disable RxPDO2 (COB-ID valid bit set + empty mapping)
  "1401sub1": { DefaultValue: "$NODEID+0x80000300" }
  "1601sub0": { DefaultValue: "0" }
  # Disable RxPDO3
  "1402sub1": { DefaultValue: "$NODEID+0x80000400" }
  "1602sub0": { DefaultValue: "0" }
