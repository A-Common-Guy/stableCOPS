name: euservo_rp
description: Yiyou EuServo RP servo module (RP EDS V1.4), cyclic superset PDO layout (CSP/CSV/CST)

vendor_eds: eds/EDS files/EuServo_RP_EDS_（RP）V1.4.eds

master:
  node_id: 127
  baudrate: 1000
  heartbeat_consumer: false
  heartbeat_producer: 0
  sync_period: 1000
  sync_window: 0
  start: true
  start_nodes: true
  reset_all_nodes: false
  stop_all_nodes: false
  boot_time: 5000

# Multiple homogeneous joints on one chain. All nodes share this same EDS and
# PDO layout, differing only by node id; dcfgen builds the master's image for
# every slave.
nodes:
 - { name: rp_joint_1, node_id: 1, mandatory: true, boot: true }
 - { name: rp_joint_2, node_id: 2, mandatory: false, boot: true }
#   - { name: rp_joint_3, node_id: 3 }

generation:
  generated_dir: generated/canopen/euservo_rp
  dcf_dir: dcf
  no_strict: true

identity_policy: ignore
pdo_policy: cyclic-superset
mode_policy: sdo-at-boot

# Fixed "cyclic superset" PDO layout: one map serves CSP, CSV and CST without
# re-mapping per mode. The active mode is selected over SDO (0x6060) while the
# node is pre-operational at boot; the drive obeys the target matching that mode
# and ignores the others, so all cyclic targets can ride the bus every cycle.
#
# RxPDO1 (0x301): controlword (0x6040:00,16) + target position (0x607A:00,32)
# RxPDO2 (0x381): target velocity (0x60FF:00,32) + target torque (0x6071:00,16)
# RxPDO3: disabled (unused).
# TPDO feedback is left at the vendor default so statusword/mode/position/
# velocity/torque stay available for every mode.
eds_overrides:
  # RxPDO1 mapping -> controlword (0x6040:00,16) + target position (0x607A:00,32)
  "1600sub0": { DefaultValue: "2" }
  "1600sub2": { DefaultValue: "0x607A0020" }
  # RxPDO2 mapping -> target velocity (0x60FF:00,32) + target torque (0x6071:00,16)
  "1401sub1": { DefaultValue: "$NODEID+0x300" }
  "1601sub0": { DefaultValue: "2" }
  "1601sub1": { DefaultValue: "0x60FF0020" }
  "1601sub2": { DefaultValue: "0x60710010" }
  # Disable RxPDO3
  "1402sub1": { DefaultValue: "$NODEID+0x80000400" }
  "1602sub0": { DefaultValue: "0" }
